services:
  - type: web
    name: infopunks-core-api
    env: node
    plan: starter
    rootDir: .
    buildCommand: npm install
    startCommand: node apps/api/server.mjs
    healthCheckPath: /healthz
    envVars:
      - key: INFOPUNKS_ENVIRONMENT
        value: production
      - key: PORT
        value: "4010"
      - key: INFOPUNKS_DB_PATH
        value: ./data/infopunks.production.db
      - key: DATA_DIR
        value: ./data
      - key: INFOPUNKS_API_KEY
        sync: false

  - type: web
    name: infopunks-x402-adapter
    env: node
    plan: starter
    rootDir: .
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: INFOPUNKS_ENVIRONMENT
        value: production
      - key: NODE_ENV
        value: production
      - key: MCP_ADAPTER_TRANSPORT
        value: http
      - key: MCP_ADAPTER_HOST
        value: 0.0.0.0
      - key: X402_REQUIRED_DEFAULT
        value: "true"
      - key: X402_FACILITATOR_PROVIDER
        value: openfacilitator
      - key: X402_VERIFIER_MODE
        value: facilitator
      - key: X402_VERIFIER_URL
        value: https://x402.org/facilitator
      - key: X402_FACILITATOR_URL
        value: https://x402.org/facilitator
      - key: X402_NETWORK
        value: base
      - key: X402_ASSET
        value: USDC
      - key: X402_ACCEPTED_ASSETS
        value: USDC
      - key: X402_SUPPORTED_NETWORKS
        value: eip155:8453
      - key: X402_PAYMENT_SCHEME
        value: exact
      - key: X402_PAYMENT_ASSET_ADDRESS
        value: 0x833589fCD6eDb6E08f4c7c32D4f71b54bdA02913
      - key: X402_PRICE_USD
        value: "0.01"
      - key: X402_PRICE_PER_UNIT_ATOMIC
        value: "10000"
      - key: X402_PAYMENT_TIMEOUT_SECONDS
        value: "300"
      - key: X402_EIP712_NAME
        value: USDC
      - key: X402_EIP712_VERSION
        value: "2"
      - key: X402_PAY_TO
        sync: false
      - key: MCP_ADAPTER_PUBLIC_URL
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: ALLOW_TESTNET
        value: "false"
      - key: ALLOW_RELAXED_PAYMENT
        value: "false"
      - key: INFOPUNKS_CORE_BASE_URL
        sync: false
      - key: INFOPUNKS_INTERNAL_SERVICE_TOKEN
        sync: false
      - key: X402_VERIFIER_API_KEY
        sync: false
      - key: MCP_ADAPTER_ADMIN_TOKEN
        sync: false
      - key: X402_SETTLEMENT_WEBHOOK_HMAC_SECRET
        sync: false
      - key: MCP_ENTITLEMENT_ISSUER
        sync: false
      - key: MCP_ENTITLEMENT_AUDIENCE
        sync: false
      - key: MCP_ENTITLEMENT_ALLOWED_ALGORITHMS
        value: RS256
      - key: MCP_ENTITLEMENT_EXEMPT_TOOLS
        value: resolve_trust
      - key: MCP_ENTITLEMENT_RS256_PUBLIC_KEY
        sync: false
      - key: MCP_ADAPTER_MULTI_INSTANCE_MODE
        value: "true"
      - key: MCP_ADAPTER_STATE_STORE_DRIVER
        value: postgres
      - key: MCP_ADAPTER_STATE_STORE_DATABASE_URL
        fromDatabase:
          name: infopunks-mcp-db
          property: connectionString
      - key: INFOPUNKS_MCP_IDENTITY_MAP_DRIVER
        value: postgres
      - key: INFOPUNKS_MCP_IDENTITY_MAP_DATABASE_URL
        fromDatabase:
          name: infopunks-mcp-db
          property: connectionString
      - key: MCP_ADAPTER_RATE_LIMIT_DRIVER
        value: postgres
      - key: MCP_ADAPTER_RATE_LIMIT_POSTGRES_URL
        fromDatabase:
          name: infopunks-mcp-db
          property: connectionString

databases:
  - name: infopunks-mcp-db
    plan: basic-256mb
