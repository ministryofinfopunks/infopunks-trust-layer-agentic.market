openapi: 3.1.0
info:
  title: Infopunks Trust Layer API
  version: 1.0.0
  summary: Paid trust resolution surface for Agentic.Market.
  description: Minimal launch contract.
servers:
  - url: http://localhost:4021
    description: Local adapter
paths:
  /health:
    get:
      summary: Liveness check
      responses:
        "200":
          description: Service is reachable
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                required: [status]
  /.well-known/infopunks-trust-layer.json:
    get:
      summary: Discovery manifest
      responses:
        "200":
          description: Public listing metadata
          content:
            application/json:
              schema:
                type: object
  /openapi.json:
    get:
      summary: OpenAPI JSON document
      responses:
        "200":
          description: OpenAPI JSON
          content:
            application/json:
              schema:
                type: object
  /v1/resolve-trust:
    post:
      summary: Resolve trust with x402 payment gating
      description: Infopunks Trust Layer resolves real-time trust scores and routing decisions for AI agents, executors, wallets, and services. It returns trust_score, policy status, route decision, evidence freshness, and risk context.
      extensions:
        bazaar:
          discoverable: true
          category: infrastructure
          tags: [trust, reputation, routing, agent-security, x402, ai-agents, risk, coordination]
      x-bazaar:
        discoverable: true
        category: infrastructure
        tags: [trust, reputation, routing, agent-security, x402, ai-agents, risk, coordination]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveTrustRequest"
      responses:
        "200":
          description: Trust resolution result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolveTrustResponse"
        "402":
          description: Payment required
          headers:
            PAYMENT-REQUIRED:
              schema:
                type: string
            x402-required:
              schema:
                type: string
                const: "true"
  /v1/events/recent:
    get:
      summary: Recent sanitized payment/trust events
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 25
      responses:
        "200":
          description: Recent event list
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  events:
                    type: array
                    items:
                      type: object
                      properties:
                        event_id:
                          type: string
                        event_type:
                          type: string
                        timestamp:
                          type: string
                        subject_id:
                          type: string
                        trust_score:
                          type: number
                        route:
                          type: string
                        confidence:
                          type: number
                        status:
                          type: string
                        facilitator_provider:
                          type: string
                        network:
                          type: string
                        payTo:
                          type: string
                        price:
                          type: string
                        risk_level:
                          type: string
                        receipt_id:
                          type: string
                        reason:
                          type: string
                required: [count, events]
components:
  schemas:
    ResolveTrustRequest:
      type: object
      properties:
        subject_id:
          type: string
        context:
          type: object
          additionalProperties: true
        payment:
          type: object
          additionalProperties: true
      required: [subject_id]
      additionalProperties: true
    ResolveTrustResponse:
      type: object
      properties:
        subject_id:
          type: string
        trust_score:
          type: number
        risk_level:
          type: string
        confidence:
          type: number
        route:
          type: string
        reasons:
          type: array
          items:
            type: string
        receipt:
          type: object
          properties:
            x402_verified:
              type: boolean
            facilitator_provider:
              type: string
            network:
              type: string
            asset:
              type: string
            payTo:
              type: string
            price:
              type: string
            payment_receipt_id:
              type: string
            verifier_reference:
              type: string
            settlement_status:
              type: string
          required: [x402_verified]
      required: [subject_id, trust_score, risk_level, confidence, route, reasons, receipt]
      additionalProperties: true
