openapi: 3.1.0
info:
  title: Infopunks Trust Layer V1
  version: 1.0.0
  summary: Deterministic trust resolution and routing substrate for multi-agent systems.
  description: |
    Source of truth for the public Infopunks Trust Layer V1 control-plane contract.
    External request and response fields use snake_case. Internal implementation may use camelCase.
servers:
  - url: http://127.0.0.1:4010
    description: Local development
security:
  - bearerAuth: []
tags:
  - name: Budget
  - name: Passport
  - name: Evidence
  - name: Disputes
  - name: Trust
  - name: Routing
  - name: Events
  - name: Webhooks
  - name: Portability
  - name: Economic
  - name: Trace
  - name: War Room
  - name: Simulator
paths:
  /healthz:
    get:
      security: []
      tags: [Trust]
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  service:
                    type: string
                required: [ok, service]
  /v1/budget/quote:
    post:
      tags: [Budget]
      summary: Quote expected compute units and response size for a trust-layer call
      x-infopunks-required-scope: read
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BudgetQuoteRequest"
      responses:
        "200":
          description: Budget quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetQuote"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "429":
          $ref: "#/components/responses/ErrorResponse"
  /v1/passports:
    post:
      tags: [Passport]
      summary: Register a subject passport
      x-infopunks-required-scope: write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PassportCreateRequest"
      responses:
        "201":
          description: Passport created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PassportCreated"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
        "429":
          $ref: "#/components/responses/ErrorResponse"
  /v1/passports/{subjectId}:
    get:
      tags: [Passport]
      summary: Fetch a subject passport
      x-infopunks-required-scope: read
      parameters:
        - $ref: "#/components/parameters/SubjectIdParam"
      responses:
        "200":
          description: Passport
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Passport"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "429":
          $ref: "#/components/responses/ErrorResponse"
  /v1/passports/{subjectId}/rotate-key:
    post:
      tags: [Passport]
      summary: Rotate or add a passport key while preserving subject identity lineage
      x-infopunks-required-scope: write
      parameters:
        - $ref: "#/components/parameters/SubjectIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PassportRotateKeyRequest"
      responses:
        "200":
          description: Updated passport
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Passport"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
        "429":
          $ref: "#/components/responses/ErrorResponse"
  /v1/evidence:
    post:
      tags: [Evidence]
      summary: Record append-only trust evidence
      x-infopunks-required-scope: write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvidenceCreateRequest"
      responses:
        "202":
          description: Evidence accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceAcceptedResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
        "429":
          $ref: "#/components/responses/ErrorResponse"
  /v1/disputes/evaluate:
    post:
      tags: [Disputes]
      summary: Evaluate a dispute deterministically from evidence lineage
      x-infopunks-required-scope: write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DisputeEvaluateRequest"
      responses:
        "200":
          description: Dispute evaluation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisputeEvaluation"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
        "429":
          $ref: "#/components/responses/ErrorResponse"
  /v1/trust/resolve:
    post:
      tags: [Trust]
      summary: Resolve scoped trust for a subject
      x-infopunks-required-scope: write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrustResolveRequest"
      responses:
        "200":
          description: Trust resolution
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustResolution"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
        "429":
          $ref: "#/components/responses/ErrorResponse"
  /v1/routing/select-validator:
    post:
      tags: [Routing]
      summary: Select validators under trust and policy constraints
      x-infopunks-required-scope: write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoutingSelectValidatorRequest"
      responses:
        "200":
          description: Routing decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoutingDecision"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
        "429":
          $ref: "#/components/responses/ErrorResponse"
  /v1/routing/select-executor:
    post:
      tags: [Routing]
      summary: Select executor candidates under trust and policy constraints
      x-infopunks-required-scope: write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoutingSelectExecutorRequest"
      responses:
        "200":
          description: Routing decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoutingDecision"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
        "429":
          $ref: "#/components/responses/ErrorResponse"
  /v1/events/stream:
    get:
      tags: [Events]
      summary: Stream trust events as server-sent events
      x-infopunks-required-scope: read
      parameters:
        - name: types
          in: query
          schema:
            type: string
        - name: subjects
          in: query
          schema:
            type: string
        - name: since
          in: query
          schema:
            type: string
      responses:
        "200":
          description: SSE stream of trust events
          content:
            text/event-stream:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "429":
          $ref: "#/components/responses/ErrorResponse"
  /v1/webhooks:
    post:
      tags: [Webhooks]
      summary: Register a signed webhook consumer for trust events
      x-infopunks-required-scope: write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookCreateRequest"
      responses:
        "201":
          description: Webhook registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookSubscription"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
        "429":
          $ref: "#/components/responses/ErrorResponse"
  /v1/portability/export:
    post:
      tags: [Portability]
      summary: Export a signed trust portability bundle for a subject
      x-infopunks-required-scope: read
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortabilityExportRequest"
      responses:
        "200":
          description: Signed portability bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustPortabilityBundle"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "429":
          $ref: "#/components/responses/ErrorResponse"
  /v1/portability/import:
    post:
      tags: [Portability]
      summary: Import a signed trust portability bundle into the local trust rail
      x-infopunks-required-scope: write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortabilityImportRequest"
      responses:
        "200":
          description: Portability import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortabilityImportResult"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
        "429":
          $ref: "#/components/responses/ErrorResponse"
  /v1/economic/escrow-quote:
    post:
      tags: [Economic]
      summary: Compute escrow guidance hooks from scoped trust and risk context
      x-infopunks-required-scope: read
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EscrowQuoteRequest"
      responses:
        "200":
          description: Escrow quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EscrowQuote"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "429":
          $ref: "#/components/responses/ErrorResponse"
  /v1/economic/risk-price:
    post:
      tags: [Economic]
      summary: Compute trust-shaped risk pricing hooks
      x-infopunks-required-scope: read
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiskPriceRequest"
      responses:
        "200":
          description: Risk price quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskPriceQuote"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "429":
          $ref: "#/components/responses/ErrorResponse"
  /v1/economic/attestation-bundle:
    post:
      tags: [Economic]
      summary: Produce a portable attestation bundle for insurance or marketplace consumers
      x-infopunks-required-scope: read
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttestationBundleRequest"
      responses:
        "200":
          description: Attestation bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttestationBundle"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "429":
          $ref: "#/components/responses/ErrorResponse"
  /v1/traces/{traceId}:
    get:
      tags: [Trace]
      summary: Fetch a replay bundle for a trace
      x-infopunks-required-scope: read
      parameters:
        - $ref: "#/components/parameters/TraceIdParam"
      responses:
        "200":
          description: Replay bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraceReplayBundle"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "429":
          $ref: "#/components/responses/ErrorResponse"
  /v1/trust/{subjectId}/explain:
    get:
      tags: [Trust]
      summary: Fetch a typed trust explanation
      x-infopunks-required-scope: read
      parameters:
        - $ref: "#/components/parameters/SubjectIdParam"
        - name: context_hash
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Trust explanation resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustExplainResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "429":
          $ref: "#/components/responses/ErrorResponse"
  /v1/prompts/{name}:
    get:
      tags: [Trust]
      summary: Fetch a built-in prompt pack
      x-infopunks-required-scope: read
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Prompt pack
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromptPack"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "429":
          $ref: "#/components/responses/ErrorResponse"
  /v1/war-room/state:
    get:
      tags: [War Room]
      summary: Fetch War Room state
      x-infopunks-required-scope: read
      responses:
        "200":
          description: War Room state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WarRoomState"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "429":
          $ref: "#/components/responses/ErrorResponse"
  /v1/sim/run:
    post:
      tags: [Simulator]
      summary: Run a simulator scenario
      x-infopunks-required-scope: write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimRunRequest"
      responses:
        "200":
          description: Simulation output
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimRunResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "429":
          $ref: "#/components/responses/ErrorResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
  parameters:
    SubjectIdParam:
      name: subjectId
      in: path
      required: true
      schema:
        type: string
    TraceIdParam:
      name: traceId
      in: path
      required: true
      schema:
        type: string
  responses:
    ErrorResponse:
      description: Error envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    ResponseCostMetadata:
      type: object
      properties:
        compute_units: { type: number }
        estimated_tokens: { type: integer }
        estimated_cost_usd: { type: number }
        response_bytes: { type: integer }
        preset:
          type: string
          enum: [minimal, standard, explain, audit]
      required: [compute_units, estimated_tokens, estimated_cost_usd, response_bytes, preset]
    BudgetHints:
      type: object
      properties:
        recommended_response_mode:
          type: string
          enum: [minimal, standard, explain, audit]
        recommended_cache_ttl_s: { type: integer }
        budget_remaining_units: { type: number }
        budget_status:
          type: string
          enum: [healthy, watch, constrained]
      required: [recommended_response_mode, recommended_cache_ttl_s, budget_remaining_units, budget_status]
    BudgetQuoteRequest:
      type: object
      properties:
        operation:
          type: string
          enum:
            - trust.resolve
            - routing.select_validator
            - routing.select_executor
            - traces.get
            - trust.explain
            - disputes.evaluate
        subject_id: { type: string }
        context:
          $ref: "#/components/schemas/EvidenceContext"
        response_mode:
          type: string
          enum: [minimal, standard, explain, audit]
        evidence_window:
          type: integer
          minimum: 1
          maximum: 200
        budget_cap_units:
          type: number
          minimum: 0
      required: [operation]
    BudgetQuote:
      type: object
      properties:
        operation: { type: string }
        estimated_compute_units: { type: number }
        estimated_tokens: { type: integer }
        estimated_cost_usd: { type: number }
        recommended_response_mode:
          type: string
          enum: [minimal, standard, explain, audit]
        budget_status:
          type: string
          enum: [healthy, watch, constrained]
        explanation:
          type: array
          items: { type: string }
        response_cost:
          $ref: "#/components/schemas/ResponseCostMetadata"
        budget_hints:
          $ref: "#/components/schemas/BudgetHints"
      required:
        - operation
        - estimated_compute_units
        - estimated_tokens
        - estimated_cost_usd
        - recommended_response_mode
        - budget_status
        - explanation
    PassportPublicKey:
      type: object
      properties:
        kid: { type: string }
        alg: { type: string }
        public_key: { type: string }
      required: [kid, alg, public_key]
    PassportCapability:
      type: object
      properties:
        name: { type: string }
        version: { type: string }
        verified: { type: boolean }
      required: [name, version, verified]
    PassportIssuer:
      type: object
      properties:
        issuer_id: { type: string }
        signature: { type: string }
        provenance:
          type: object
          properties:
            trust_anchor: { type: string }
            verification_method: { type: string }
            issued_at: { type: string, format: date-time }
          required: [trust_anchor, verification_method, issued_at]
      required: [issuer_id, signature, provenance]
    PassportLifecycle:
      type: object
      properties:
        status: { type: string, enum: [active, suspended, revoked] }
        status_reason:
          type: [string, "null"]
        last_status_change_at: { type: string, format: date-time }
        last_key_rotation_at:
          type: [string, "null"]
          format: date-time
        key_count: { type: integer }
      required: [status, status_reason, last_status_change_at, last_key_rotation_at, key_count]
    PassportPortability:
      type: object
      properties:
        portable_format: { type: string }
        exportable: { type: boolean }
        scope_defaults_included: { type: boolean }
        issuer_attested: { type: boolean }
      required: [portable_format, exportable, scope_defaults_included, issuer_attested]
    ReputationScopeDefaults:
      type: object
      properties:
        domains:
          type: array
          items: { type: string }
        risk_tolerance:
          type: string
          enum: [low, medium, high]
      required: [domains, risk_tolerance]
    PassportCreateRequest:
      type: object
      properties:
        subject_id: { type: string }
        subject_type:
          type: string
          enum: [agent, validator, operator_service, tool_adapter]
        did: { type: string }
        issuer:
          $ref: "#/components/schemas/PassportIssuer"
        public_keys:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/PassportPublicKey"
        capabilities:
          type: array
          items:
            $ref: "#/components/schemas/PassportCapability"
        reputation_scope_defaults:
          $ref: "#/components/schemas/ReputationScopeDefaults"
        metadata:
          type: object
          additionalProperties: true
      required: [subject_id, subject_type, public_keys, capabilities]
    PassportRotateKeyRequest:
      type: object
      properties:
        key:
          $ref: "#/components/schemas/PassportPublicKey"
        reason: { type: string }
      required: [key]
    PassportCreated:
      type: object
      properties:
        passport_id: { type: string }
        subject_id: { type: string }
        status: { type: string, enum: [active] }
        issuer:
          $ref: "#/components/schemas/PassportIssuer"
        created_at: { type: string, format: date-time }
        response_cost:
          $ref: "#/components/schemas/ResponseCostMetadata"
        budget_hints:
          $ref: "#/components/schemas/BudgetHints"
      required: [passport_id, subject_id, status, issuer, created_at]
    Passport:
      allOf:
        - $ref: "#/components/schemas/PassportCreated"
        - type: object
          properties:
            subject_type:
              type: string
              enum: [agent, validator, operator_service, tool_adapter]
            did:
              type: [string, "null"]
            public_keys:
              type: array
              items:
                $ref: "#/components/schemas/PassportPublicKey"
            capabilities:
              type: array
              items:
                $ref: "#/components/schemas/PassportCapability"
            reputation_scope_defaults:
              $ref: "#/components/schemas/ReputationScopeDefaults"
            lifecycle:
              $ref: "#/components/schemas/PassportLifecycle"
            portability:
              $ref: "#/components/schemas/PassportPortability"
            metadata:
              type: object
              additionalProperties: true
            updated_at:
              type: string
              format: date-time
          required: [subject_type, did, public_keys, capabilities, reputation_scope_defaults, lifecycle, portability, metadata, updated_at]
    EvidenceValidator:
      type: object
      properties:
        validator_id: { type: string }
        verdict:
          type: string
          enum: [pass, fail, abstain]
        weight: { type: number, minimum: 0, maximum: 1 }
        reason_codes:
          type: array
          items: { type: string }
      required: [validator_id, verdict, weight, reason_codes]
    EvidenceContext:
      type: object
      properties:
        task_type: { type: string }
        domain: { type: string }
        risk_level:
          type: string
