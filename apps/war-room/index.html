<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Infopunks Trust Layer War Room</title>
    <link rel="stylesheet" href="/war-room/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div>
          <p class="eyebrow">Infopunks Trust Layer</p>
          <h1>Paid-call proof feed</h1>
          <p class="lede">Minimal proof-of-life logs for x402 trust-resolution calls.</p>
        </div>
        <div class="status-grid">
          <div><span>API</span><strong id="api-status">Connecting</strong></div>
          <div><span>Last Event</span><strong id="last-event">Waiting</strong></div>
        </div>
      </section>
      <section class="grid one-column">
        <article class="panel">
          <h2>Recent Paid Trust Events</h2>
          <div id="event-feed" class="list tall"></div>
        </article>
      </section>
    </main>
    <script type="module" src="/war-room/app.js"></script>
  </body>
</html>
